name: Build Scrcpy-Android with scrcpy v4.0

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout android client
        uses: actions/checkout@v4
        with:
          repository: feggaa/scrcpy-android

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Download scrcpy-server v4.0
        run: |
          curl -L -o scrcpy-server https://github.com/Genymobile/scrcpy/releases/download/v4.0/scrcpy-server-v4.0
          mkdir -p app/src/main/assets
          cp scrcpy-server app/src/main/assets/scrcpy-server
          chmod +x app/src/main/assets/scrcpy-server

      - name: Patch client version string (optional)
        run: |
          find app/src/main/java -name "*.kt" -exec sed -i 's/SERVER_VERSION = ".*"/SERVER_VERSION = "4.0"/' {} + || true

      - name: Build debug APK
        run: ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: scrcpy-android-v4.0
          path: app/build/outputs/apk/debug/app-debug.apk
