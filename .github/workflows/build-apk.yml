name: Build Scrcpy-Android with scrcpy v4.0

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout android client
        uses: actions/checkout@v4
        with:
          repository: feggaa/scrcpy-android
          path: .

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: gradle

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Download scrcpy-server v4.0
        run: |
          curl -L -o scrcpy-server https://github.com/Genymobile/scrcpy/releases/download/v4.0/scrcpy-server-v4.0
          mkdir -p app/src/main/assets
          cp scrcpy-server app/src/main/assets/scrcpy-server

      - name: Inspect build.gradle.kts (查看 signingConfigs 用了哪些变量)
        run: |
          echo "========== 完整 app/build.gradle.kts =========="
          cat app/build.gradle.kts
          echo "========== 仅 signingConfigs 相关行 =========="
          grep -n "storeFile\|storePassword\|keyAlias\|keyPassword\|getenv\|KEYSTORE\|KEY_\|SIGNING" app/build.gradle.kts || echo "未找到相关行"

      - name: Create dummy keystore
        run: |
          keytool -genkeypair -v \
            -keystore /tmp/dummy.jks \
            -alias dummy -keyalg RSA -keysize 2048 -validity 10000 \
            -storepass android -keypass android \
            -dname "CN=Dummy" -noprompt

      - name: Patch version string
        run: |
          find app/src/main/java -type f -name "*.kt" \
            -exec sed -i 's/SERVER_VERSION = ".*"/SERVER_VERSION = "4.0"/' {} + || true

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      - name: Build debug APK
        env:
          KEYSTORE_FILE: /tmp/dummy.jks
          KEYSTORE_PASSWORD: android
          KEY_ALIAS: dummy
          KEY_PASSWORD: android
        run: ./gradlew assembleDebug --stacktrace

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: scrcpy-android-v4.0
          path: app/build/outputs/apk/debug/app-debug.apk
