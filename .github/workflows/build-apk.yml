name: Build Scrcpy-Android with latest server

on:
  workflow_dispatch:  # 手动点一下就跑

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Download latest scrcpy-server (v3.3.1)
        run: |
          curl -L -o scrcpy-server https://github.com/Genymobile/scrcpy/releases/download/v3.3.1/scrcpy-server-v3.3.1
          # feggaa 项目把 server 放在 assets 目录
          mkdir -p app/src/main/assets
          cp scrcpy-server app/src/main/assets/scrcpy-server
          chmod +x app/src/main/assets/scrcpy-server

      - name: Build debug APK
        run: ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: scrcpy-android-latest
          path: app/build/outputs/apk/debug/app-debug.apk
